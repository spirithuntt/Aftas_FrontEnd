<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-3 gap-4">
  <div *ngFor="let member of members" class="flex items-start">
    <div class="bg-white rounded-lg overflow-hidden shadow-md w-full">
      <img src="assets/images/image-gallery/avatar.jpg" alt="Competition" class="w-full" />
      <div class="p-4">
        <h5 class="text-lg font-bold">{{ member.name }} {{ member.familyName }}</h5>
        <ul class="list-none">
          <li class="text-gray-600 line-through">{{ member.number }}</li>
          <li class="text-green-500">{{ member.nationality }}</li>
        </ul>
        <div class="flex items-center justify-between mt-4">
          <span>{{ member.identityNumber }}</span>
          <div class="mt-2">
            <a href="#" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded" (click)="insertHunting(member.number)">Insert hunting</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
