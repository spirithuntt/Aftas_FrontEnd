<div class="mb-5 title text-center mt-4">
  <h2 class="text-2xl font-medium text-blue-500 dark:text-white mt-5">Register Member to Competition</h2>
</div>
<form class="max-w-sm mx-auto" [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
  <div class="mb-5">
    <label for="memberId" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Member Id</label>
    <input type="input" id="memberId" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Enter Member Id" required formControlName="member">
  </div>
  <div class="mb-5">
    <label for="competitionId" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Competition Id</label>
    <input type="input" id="competitionId" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Enter Competition Id" required formControlName="competition">
  </div>
  <button type="submit" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm w-full sm:w-auto px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800" [disabled]="registrationForm.invalid">Submit</button>
</form>
