<p>insert-results works!</p>
<h2>Insert Hunting Results</h2>

<form (ngSubmit)="onSubmit()" [formGroup]="insertResultsForm">
  <div>
    <!-- hidden competition id -->
    <input type="hidden" id="competitionId" name="competitionId" formControlName="competitionId" [value]="competitionId">

    <label for="member">Member:</label>
    <input type="number" id="member" name="member" formControlName="member" required>
  </div>
  <div>
    <label for="fish">Fish:</label>
    <input type="number" id="fish" name="fish" formControlName="fish" required>
  </div>
  <div>
    <label for="weight">Weight:</label>
    <input type="number" id="weight" name="weight" formControlName="weight" required>
  </div>

  <button type="submit">Insert Results</button>
</form>
